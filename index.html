<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Monsterpatch Squad Builder</title>
    <style>
        body { background-color: #3b302c; color: #f4e1c1; font-family: sans-serif; text-align: center; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        .slot { border: 2px solid #f4e1c1; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>MONSTERPATCH SQUAD BUILDER</h1>
    <p>ALPHA v1.0.0</p>
    
    <div class="container">
        <div class="slot"><h3>SLOT 1</h3></div>
        <div class="slot"><h3>SLOT 2</h3></div>
        <div class="slot"><h3>SLOT 3</h3></div>
        <div class="slot"><h3>SLOT 4</h3></div>
    </div>
</body>
</html>
