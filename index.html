<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Monsterpatch Squad Builder</title>
    <style>
        @font-face {
            font-family: 'MyConsolas';
            src: url('https://raw.githubusercontent.com/monsterpatchwiki-spec/font/main/consolas.ttf') format('truetype');
        }

        :root {
            --red: #d15c62; --blue: #4b689f; --purple: #874185; --pink: #DE9996;
            --black: #342420; --grey: #808a91; --white: #eadfc1; --yellow: #d8bc6a;
        }

        body { 
            background-color: var(--black); font-family: 'MyConsolas', 'Consolas', monospace; 
            font-weight: bold; padding: 5px; font-size: 10px; margin: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .page-wrapper { width: 950px; }

        .top-header { 
            display: flex; justify-content: space-between; align-items: center; 
            color: var(--white); margin-bottom: 5px; border-bottom: 2px solid var(--white); 
        }
        
        .slot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; justify-items: center; }
        
        .slot { 
            border: 3px solid var(--grey); padding: 8px; background-color: var(--white); 
            border-radius: 6px; position: relative; width: 460px;
        }
        
        .segment-title {
            position: absolute; top: -8px; left: 6px; padding: 0px 4px; 
            border: 2px solid var(--black); font-weight: bold; border-radius: 3px; font-size: 9px;
        }
        
        .tab-slot { background: var(--yellow); }
        .tab-moveset { background: var(--blue); color: white; }
        .tab-passives { background: var(--purple); color: white; }
        .tab-stats { background: var(--red); color: white; }

        .section-box { border: 2px solid var(--blue); padding: 6px; margin-top: 10px; position: relative; }
        .passives-box { border: 2px solid var(--purple); }
        
        .sprite-row { display: flex; gap: 5px; margin-top: 8px; }
        .sprite-box { border: 2px solid var(--black); width: 100px; height: 60px; background: var(--white); }
        .info-col { flex: 1; display: flex; flex-direction: column; gap: 2px; }

        .stats-panel { border: 2px solid var(--red); padding: 8px 6px; position: relative; margin-top: 10px; }
        .stat-row { display: flex; align-items: center; gap: 3px; margin: 1px 0; }
        .stat-bar { height: 5px; flex-grow: 1; background: #ddd; border: 1px solid #999; }
        
        input, select, button { font-family: 'MyConsolas', 'Consolas', monospace; font-weight: bold; font-size: 10px; padding: 1px; }
        .btn { padding: 2px 8px; background: var(--pink); border: 2px solid var(--black); }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="top-header">
            <div><h1 style="font-size: 16px; margin:0;">MONSTERPATCH SQUAD BUILDER</h1></div>
            <div><button class="btn">IMPORT</button> <button class="btn">EXPORT</button></div>
        </div>
        
        <div class="slot-grid">
            <script>
                function createSlot(num) {
                    document.write(`
                        <div class="slot">
                            <div class="segment-title tab-slot">SLOT ${num}</div>
                            <div style="display: flex; gap: 4px; margin-top: 2px;">
                                <input type="text" placeholder="NICKNAME" style="flex:1;">
                                Lv <input type="number" value="50" style="width: 30px;">
                            </div>
                            <div class="section-box">
                                <div class="segment-title tab-moveset">MOVESET</div>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 3px;">
                                    <input type="text" placeholder="M1"><input type="text" placeholder="M2"><input type="text" placeholder="M3"><input type="text" placeholder="M4">
                                </div>
                            </div>
                            <div class="section-box passives-box">
                                <div class="segment-title tab-passives">PASSIVES</div>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 3px;">
                                    <input type="text" placeholder="P1"><input type="text" placeholder="P2"><input type="text" placeholder="P3"><input type="text" placeholder="P4">
                                </div>
                            </div>
                            <div class="sprite-row">
                                <div class="sprite-box"></div>
                                <div class="info-col">
                                    <select><option>Select Mon</option></select>
                                    <input type="text" placeholder="Held Item">
                                    <div style="display:flex; gap:1px;"><input type="text" placeholder="Type 1"><input type="text" placeholder="Type 2"></div>
                                </div>
                            </div>
                            <div class="stats-panel">
                                <div class="segment-title tab-stats">STATS</div>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
                                    ${['HP','ATK','MAG','DEF','RES','SPD'].map(s => `
                                        <div class="stat-row">
                                            <span style="width:20px;">${s}</span>
                                            <select style="width:25px;"><option>C</option></select>
                                            <div class="stat-bar"></div>
                                            <span style="width:15px; text-align:right;">40</span>
                                        </div>
                                    `).join('')}
                                </div>
                                <div style="margin-top:5px; font-size: 9px;">VIBE: <select style="width:80%;"></select></div>
                            </div>
                        </div>
                    `);
                }
                for(let i=1; i<=4; i++) createSlot(i);
            </script>
        </div>
    </div>
</body>
</html>
