<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Monsterpatch Squad Builder</title>
    <style>
        /* Embedding the custom font from your GitHub repository */
        @font-face {
            font-family: 'MyConsolas';
            src: url('https://raw.githubusercontent.com/monsterpatchwiki-spec/font/main/consolas.ttf') format('truetype');
        }

        body { 
            background-color: #342420; 
            font-family: 'MyConsolas', 'Consolas', 'Courier New', monospace; 
            padding: 20px; 
            font-size: 13px; 
        }
        .page-header { color: #eadfc1; text-align: center; margin-bottom: 20px; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 900px; margin: 0 auto; }
        
        /* Slot: Green border */
        .slot { border: 4px solid #A2BA9C; padding: 20px; background-color: #eadfc1; border-radius: 12px; position: relative; margin-top: 15px; }
        
        /* Tab Styles */
        .segment-title {
            position: absolute; top: -12px; left: 10px; padding: 2px 8px; 
            border: 2px solid #342420; font-weight: bold; border-radius: 4px; font-size: 11px;
        }
        .tab-slot { background: #d8bc6a; top: -15px; left: 15px; }
        .tab-moveset { background: #4b689f; color: white; }
        .tab-stats { background: #DE9996; }
        .tab-passives { background: #874185; color: white; }

        /* Segment Borders */
        .moveset-box { border: 3px solid #4b689f; background-color: transparent; padding: 15px 10px 10px 10px; margin-bottom: 15px; position: relative; margin-top: 15px; }
        .stats-panel { border: 3px solid #DE9996; background-color: transparent; padding: 15px 10px 10px 10px; flex: 1; position: relative; margin-top: 15px; }
        .passives-panel { border: 3px solid #874185; background-color: transparent; padding: 15px 10px 10px 10px; flex: 1; position: relative; margin-top: 15px; }
        
        .sprite-box { border: 3px solid #342420; width: 140px; height: 140px; background: #eadfc1; }
        .bottom-info { display: flex; gap: 15px; }
        .stat-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
        
        /* Form elements */
        input, select { background: #eadfc1; border: 1px solid #342420; padding: 4px; font-family: 'MyConsolas', 'Consolas', monospace; }
    </style>
</head>
<body>

    <div class="page-header">
        <h1>MONSTERPATCH SQUAD BUILDER</h1>
        <p>ALPHA v1.0.0</p>
    </div>
    
    <div class="container">
        <script>
            function createSlot(num) {
                document.write(`
                    <div class="slot">
                        <div class="segment-title tab-slot">SLOT ${num}</div>
                        
                        <div style="display: flex; gap: 10px; margin-top: 10px; margin-bottom: 15px;">
                            <input type="text" placeholder="NICKNAME" style="flex:1;">
                            Lv <input type="number" value="50" style="width: 40px;">
                            <input type="checkbox"> SPARKLE
                        </div>
                        
                        <div class="moveset-box">
                            <div class="segment-title tab-moveset">MOVESET</div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                                <input type="text" placeholder="Move 1"> <input type="text" placeholder="Move 2">
                                <input type="text" placeholder="Move 3"> <input type="text" placeholder="Move 4">
                            </div>
                        </div>
                        
                        <div style="display: flex; gap: 15px; margin-bottom: 5px;">
                            <div class="sprite-box"></div>
                            <div style="flex:1;">
                                <input type="text" placeholder="003 Hawkamere" style="width: 100%; margin-bottom: 5px;"><br>
                                <input type="text" placeholder="Held Item" style="width: 100%;">
                            </div>
                        </div>
                        
                        <div class="bottom-info">
                            <div class="stats-panel">
                                <div class="segment-title tab-stats">STATS</div>
                                ${['HP','ATK','MAG','DEF','RES','SPD'].map(s => `
                                    <div class="stat-row">
                                        <span style="width:30px; font-weight:bold;">${s}</span> 
                                        <select><option>C</option></select>
                                        <div style="height:10px; width:40px; background:#d8bc6a;"></div>
                                        <span>40</span>
                                    </div>
                                `).join('')}
                            </div>
                            
                            <div class="passives-panel">
                                <div class="segment-title tab-passives">PASSIVES</div>
                                <input type="text" placeholder="Passive 1" style="width:90%; display:block; margin:6px 0;">
                                <input type="text" placeholder="Passive 2" style="width:90%; display:block; margin:6px 0;">
                                <input type="text" placeholder="Passive 3" style="width:90%; display:block; margin:6px 0;">
                                <input type="text" placeholder="Passive 4" style="width:90%; display:block; margin:6px 0;">
                            </div>
                        </div>
                    </div>
                `);
            }
        </script>
        <script>for(let i=1; i<=4; i++) createSlot(i);</script>
    </div>
</body>
</html>
