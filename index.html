<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Monsterpatch Squad Builder</title>
    <style>
        @font-face {
            font-family: 'MyConsolas';
            src: url('https://raw.githubusercontent.com/monsterpatchwiki-spec/font/main/consolas.ttf') format('truetype');
        }
        :root {
            --red: #d15c62; --blue: #4b689f; --purple: #874185; --pink: #DE9996;
            --black: #342420; --grey: #808a91; --white: #eadfc1; --yellow: #d8bc6a;
        }
        body { 
            background-color: var(--black); font-family: 'MyConsolas', monospace; 
            font-weight: bold; padding: 20px; margin: 0;
            display: flex; justify-content: center;
        }

        .main-dashboard { display: flex; gap: 20px; justify-content: center; align-items: flex-start; }
        .sidebar { width: 320px; background: var(--white); border: 4px solid var(--grey); padding: 15px; border-radius: 12px; min-height: 700px; }
        .matrix-table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; color: var(--black); margin-top: 10px; }
        .matrix-table th, .matrix-table td { border: 1px solid var(--black); padding: 6px; }

        .page-wrapper { width: 990px; }
        .top-header { display: flex; justify-content: space-between; align-items: flex-end; color: var(--white); margin-bottom: 20px; border-bottom: 2px solid var(--white); padding-bottom: 10px; }
        .header-text h1 { margin: 0; font-size: 28px; }
        .header-buttons { display: flex; gap: 10px; }
        .btn { background: var(--pink); border: 2px solid var(--black); padding: 8px 16px; font-weight: bold; cursor: pointer; font-family: 'MyConsolas', monospace; }
        .slot-grid { display: grid; grid-template-columns: 484px 484px; gap: 22px; justify-content: center; }
        .slot { border: 4px solid var(--grey); padding: 22px; background-color: var(--white); border-radius: 12px; position: relative; margin-top: 17px; min-height: 600px; }
        .segment-title { position: absolute; top: -13px; left: 11px; padding: 2px 9px; border: 2px solid var(--black); font-weight: bold; border-radius: 4px; font-size: 12px; }
        .tab-slot { background: var(--yellow); top: -17px; left: 17px; }
        .tab-moveset { background: var(--blue); color: white; }
        .tab-passives { background: var(--purple); color: white; }
        .tab-stats { background: var(--red); color: white; }
        .section-box { border: 3px solid var(--blue); padding: 17px 11px 11px 11px; margin-bottom: 17px; position: relative; margin-top: 17px; }
        .passives-box { border: 3px solid var(--purple); }
        .sprite-section { display: flex; gap: 11px; margin-bottom: 10px; }
        .sprite-box { border: 3px solid var(--black); width: 220px; height: 154px; background: var(--white); }
        .info-col { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .stats-panel { border: 3px solid var(--red); padding: 17px 11px 11px 11px; position: relative; margin-top: 17px; }
        .stat-row { display: flex; align-items: center; gap: 4px; margin: 4px 0; }
        .stat-bar { height: 8px; flex-grow: 1; background: #ddd; border: 1px solid #999; border-radius: 2px; }
        input, select { background: var(--white); border: 1px solid var(--black); padding: 2px; font-family: 'MyConsolas', monospace; font-weight: bold; font-size: 11px; }
    </style>
</head>
<body>

<div class="main-dashboard">
    <div class="sidebar">
        <h3 style="margin-top:0;">OFFENSIVE MATCHUPS</h3>
    </div>

    <div class="page-wrapper">
        <div class="top-header">
            <div class="header-text"><h1>MONSTERPATCH SQUAD BUILDER</h1><p>ALPHA v1.0.0</p></div>
            <div class="header-buttons"><button class="btn">IMPORT</button> <button class="btn">EXPORT</button></div>
        </div>
        
        <div class="slot-grid">
            <script>
                const monList = ["001 Birb", "002 Feenix", "003 Hawkamere", "004 Axolot", "005 Neptoon", "006 Salamight", "007 Gojiru", "008 Gaiaru", "009 Gaiazard", "010 Pachi", "011 Stitchi", "012 Teddychi", "013 Demidemon", "014 Demidevil", "015 Demigorgon", "016 Flauna", "017 Crystelle", "018 Auricorn", "019 Piglit", "020 Poghog", "021 Gigaboar", "022 Murkjaw", "023 Doomfin", "024 Terrorjaw", "025 Glub", "026 Tadglub", "027 Froglob", "028 Moomoo", "029 Bullwark", "030 Aegitaur", "031 Ecto", "032 Toxlic", "033 Noxecution", "034 Nibblesaur", "035 Rubblesaur", "036 Tyrannox", "037 Gnoblin", "038 Snagglin", "039 Garuogre", "040 Dragini", "041 Luvdra", "042 Dragalia", "043 Poplit", "044 Emberlily", "045 Flamara", "046 Terrabone", "047 Terrahorn", "048 Terraclops", "049 Bloaty", "050 Pinpuffer", "051 Bulbosword", "052 Harebelle", "053 Rowdibelle", "054 Bellarina", "055 Lilitad", "056 Lilipet", "057 Lilifrog", "058 Shellin", "059 Glorpin", "060 Glorpius", "061 Zagon", "062 Zellgon", "063 Zagnarok", "064 Cubskull", "065 Gloomcub", "066 Grislybear", "067 Embpurr", "068 Pyremane", "069 Solareon", "070 Wyrmpool", "071 Wyrmwind", "072 Glaedria", "073 Snok", "074 Lunaconda", "075 Cobraclysm", "076 Poppeep", "077 Faequill", "078 Pocobo", "079 Gardslug", "080 Cadeetle", "081 Bugbastion", "082 Squito", "083 Mossquito", "084 Venomite", "085 Polly", "086 Cluccaneer", "087 Beakbeard", "088 Dracobull", "089 Dracohorn", "090 Bullzerker", "091 Gillywatt", "092 Gulpawatt", "093 Lanterror", "094 Charchunk", "095 Infernace", "096 Hadrion", "097 Dumblo", "098 Driftusk", "099 Lullaphant", "100 Helmkin", "101 Hollowisp", "102 Knightgeist", "103 Nessie", "104 Moxasaur", "105 Coralodon", "106 Wilowisp", "107 Wilowraith", "108 Revreaper", "109 Alligyle", "110 Waddlgator", "111 Crocolossus", "112 Redcap", "113 Sporch", "114 Gloomshroom", "115 Psyclod", "116 Psytongue", "117 Psyrock", "118 Pengu", "119 Pengurai", "120 Raironin", "121 Clammler", "122 Shelltler", "123 Shieldler", "124 Bonpot", "125 Bonsprout", "126 Bonblossom", "127 Bitmant", "128 Metalmant", "129 Adamantis", "130 Corsea", "131 Seapuff", "132 Hippoflare", "133 Gurgle", "134 Gurgoyle", "135 Goregyle", "136 Caterbug", "137 Lavalarva", "138 Monarchfly", "139 Gubble", "140 Gyoshi", "141 Bubblegon", "142 Tanooki", "143 Tanuko", "144 Tanukuma", "145 Smoldodo", "146 Opyryx", "147 Ignychus", "148 Blubbo", "149 Narwelt", "150 Narwallop", "151 Grinnlin", "152 Gobjank", "153 Gobsmurk", "154 Cacoto", "155 Cacotid", "156 Cacoton", "157 Chicky", "158 Silligoose", "159 Doomchicken", "160 Glibat", "161 Hexbat", "162 Blightbat", "163 Pokoroko", "164 Shakasaru", "165 Masukusaru", "166 Ghostkit", "167 Netherlynx", "168 Shimmerclaw", "169 Wimpid", "170 Velvolt", "171 Vespabolt", "172 Weenut", "173 Spriggent", "174 Enchantree", "175 Kraba", "176 Krabaghast", "177 Krabaghoul", "178 Dootle", "179 Dingdung", "180 Astrobug", "181 Cawful", "182 Cultcrow", "183 Covencrow", "184 Goopy", "185 Mitomoeba", "186 Protoslime", "187 Mimlick", "188 Fortresst", "189 Ghoulgalion", "190 Fluffin", "191 Owlsage", "192 Arcanowl", "193 Snoosnail", "194 Magmolten", "195 Warloctopus", "196 Jellyzip", "197 Jellyzap", "198 Jellystorm", "199 Rohoot", "200 Rohawk", "201 Griffiron", "202 Elixapot", "203 Elixabrew", "204 Elixadon", "205 Meowmau", "206 Bastcat", "207 Cleocatra", "208 Millapod", "209 Centascale", "210 Dragapede", "211 Kiplet", "212 Kippurr", "213 Kippycat", "214 Toatoad", "215 Toadjinn", "216 Explotoad"];
                const vibes = ["Playful (MAG+/ATK-)", "Lazy (DEF+/ATK-)", "Humble (RES+/ATK-)", "Suave (SPD+/ATK-)", "Spicy (ATK+/MAG-)", "Somber (DEF+/MAG-)", "Mellow (RES+/MAG-)", "Bouncy (SPD+/MAG-)", "Reckless (ATK+/DEF-)", "Dramatic (MAG+/DEF-)", "Sweet (RES+/DEF-)", "Daring (SPD+/DEF-)", "Wild (ATK+/RES-)", "Goofy (MAG+/RES-)", "Clumsy (DEF+/RES-)", "Anxious (SPD+/RES-)", "Fierce (ATK+/SPD-)", "Zesty (MAG+/SPD-)", "Stalwart (DEF+/SPD-)", "Shy (RES+/SPD-)"];

                function createSlot(num) {
                    let options = monList.map(mon => `<option>${mon}</option>`).join('');
                    let vibeOptions = vibes.map(v => `<option>${v}</option>`).join('');
                    
                    // Create Dropdown Options
                    let tierOpts = ['S','A','B','C','D'].map(t => `<option>${t}</option>`).join('');
                    let invOpts = ['0','1','2','3'].map(i => `<option>${i}</option>`).join('');

                    document.write(`
                        <div class="slot">
                            <div class="segment-title tab-slot">SLOT ${num}</div>
                            <div style="display: flex; gap: 11px; margin-top: 11px; margin-bottom: 17px; align-items: center;">
                                <input type="text" placeholder="NICKNAME" style="flex:1;">
                                Lv <input type="number" value="50" style="width: 44px;">
                                <label style="display:flex; align-items:center; gap:4px;"><input type="checkbox"> SPARKLE</label>
                            </div>
                            <div class="section-box"><div class="segment-title tab-moveset">MOVESET</div><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 11px;"><input type="text" placeholder="Move 1"> <input type="text" placeholder="Move 2"> <input type="text" placeholder="Move 3"> <input type="text" placeholder="Move 4"></div></div>
                            <div class="section-box passives-box"><div class="segment-title tab-passives">PASSIVES</div><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 11px;"><input type="text" placeholder="Passive 1"> <input type="text" placeholder="Passive 2"> <input type="text" placeholder="Passive 3"> <input type="text" placeholder="Passive 4"></div></div>
                            <div class="sprite-section"><div style="display: flex; flex-direction: column; gap: 6px;"><div class="sprite-box"></div><div style="display: flex; gap: 6px;"><input type="text" placeholder="Type 1" style="width: 104px;"> <input type="text" placeholder="Type 2" style="width: 104px;"></div></div><div class="info-col"><select style="width: 100%;"><option>Select Mon</option>${options}</select><input type="text" placeholder="Held Item" style="width: 100%;"></div></div>
                            
                            <div class="stats-panel">
                                <div class="segment-title tab-stats">STATS</div>
                                <div style="display: flex; flex-direction: column; gap: 6px;">
                                    ${['HP','ATK','MAG','DEF','RES','SPD'].map(s => `
                                        <div class="stat-row">
                                            <span style="width:30px; font-weight:bold; font-size:11px;">${s}</span> 
                                            <select style="width:35px;">${tierOpts}</select>
                                            <select style="width:30px;">${invOpts}</select>
                                            <div class="stat-bar"></div>
                                            <span style="font-size:11px; width:15px; text-align:right;">40</span>
                                        </div>
                                    `).join('')}
                                </div>
                                <div style="margin-top:15px; border-top:1px solid var(--grey); padding-top:10px;">
                                    <label style="font-weight:bold;">VIBE:</label> 
                                    <select style="width:80%;">${vibeOptions}</select>
                                </div>
                            </div>
                        </div>
                    `);
                }
                for(let i=1; i<=4; i++) createSlot(i);
            </script>
        </div>
    </div>

    <div class="sidebar">
        <h3 style="margin-top:0;">DEFENSIVE MATCHUPS</h3>
    </div>
</div>

</body>
</html>
