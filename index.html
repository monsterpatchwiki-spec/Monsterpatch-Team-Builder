<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Monsterpatch Squad Builder</title>
    <style>
        body { background-color: #342420; font-family: sans-serif; padding: 20px; font-size: 12px; }
        .page-header { color: #eadfc1; text-align: center; margin-bottom: 20px; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 900px; margin: 0 auto; }
        
        /* 1. Thicker borders, 4. Taller slots */
        .slot { border: 4px solid #A2BA9C; padding: 20px; background-color: #eadfc1; border-radius: 12px; position: relative; margin-top: 15px; }
        .slot-title { position: absolute; top: -15px; left: 15px; background: #d8bc6a; color: #342420; padding: 4px 12px; border: 2px solid #342420; font-weight: bold; border-radius: 4px; }
        
        .moveset-box { border: 3px solid #4b689f; padding: 10px; margin-bottom: 15px; }
        
        /* 4. Bigger image spot */
        .sprite-box { border: 3px solid #342420; width: 140px; height: 140px; background: #eadfc1; }
        
        .stats-panel { border: 3px solid #DE9996; padding: 10px; flex: 1; }
        /* 2. Passives moved left (via margin-right) */
        .passives-panel { border: 3px solid #874185; padding: 10px; flex: 1; margin-left: -5px; }
        
        .stat-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
        input, select { background: #eadfc1; border: 1px solid #342420; padding: 4px; }
    </style>
</head>
<body>

    <div class="page-header">
        <h1>MONSTERPATCH SQUAD BUILDER</h1>
        <p>ALPHA v1.0.0</p>
    </div>
    
    <div class="container">
        <script>
            function createSlot(num) {
                document.write(`
                    <div class="slot">
                        <div class="slot-title">SLOT ${num}</div>
                        <div style="display: flex; gap: 10px; margin-top: 10px; margin-bottom: 15px;">
                            <input type="text" placeholder="NICKNAME" style="flex:1;">
                            Lv <input type="number" value="50" style="width: 40px;">
                            <input type="checkbox"> SPARKLE
                        </div>
                        <div class="moveset-box">
                            <strong>MOVESET</strong><br>
                            <input type="text" placeholder="Move 1"> <input type="text" placeholder="Move 2"><br>
                            <input type="text" placeholder="Move 3"> <input type="text" placeholder="Move 4">
                        </div>
                        <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                            <div class="sprite-box"></div>
                            <div style="flex:1;">
                                <input type="text" placeholder="003 Hawkamere" style="width: 100%; margin-bottom: 5px;"><br>
                                <input type="text" placeholder="Held Item" style="width: 100%;">
                            </div>
                        </div>
                        <div style="display: flex;">
                            <div class="stats-panel">
                                <strong>STATS</strong>
                                ${['HP','ATK','MAG','DEF','RES','SPD'].map(s => `
                                    <div class="stat-row">
                                        <span style="width:30px;">${s}</span> 
                                        <select><option>C</option></select>
                                        <div style="height:10px; width:40px; background:#d8bc6a;"></div>
                                        <span>40</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="passives-panel">
                                <strong>PASSIVES</strong>
                                <input type="text" placeholder="Passive 1" style="width:90%; display:block; margin:6px 0;">
                                <input type="text" placeholder="Passive 2" style="width:90%; display:block; margin:6px 0;">
                                <input type="text" placeholder="Passive 3" style="width:90%; display:block; margin:6px 0;">
                                <input type="text" placeholder="Passive 4" style="width:90%; display:block; margin:6px 0;">
                            </div>
                        </div>
                    </div>
                `);
            }
        </script>
        <script>for(let i=1; i<=4; i++) createSlot(i);</script>
    </div>
</body>
</html>
