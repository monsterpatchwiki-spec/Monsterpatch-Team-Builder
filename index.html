<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Monsterpatch Squad Builder</title>
    <style>
        body { background-color: #3b302c; color: #342420; font-family: sans-serif; padding: 20px; font-size: 12px; }
        .page-header { color: #f4e1c1; text-align: center; margin-bottom: 20px; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 900px; margin: 0 auto; }
        
        /* Slot Container */
        .slot { border: 2px solid #5a4a45; padding: 10px; background-color: #eadfc1; }
        .slot-title { font-weight: bold; background: #89514e; color: white; display: inline-block; padding: 2px 8px; margin-bottom: 5px; }
        
        /* Headers & Sections */
        .header-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .moveset-box { background: #89514e; padding: 5px; margin-bottom: 10px; color: white; }
        
        /* Middle Section: Sprite + Selection */
        .main-info { display: flex; gap: 10px; margin-bottom: 10px; }
        .sprite-box { border: 2px solid #342420; width: 100px; height: 100px; }
        
        /* Bottom: Stats & Passives */
        .bottom-info { display: flex; gap: 10px; }
        .stats-panel { flex: 1; border: 2px solid #808a91; padding: 5px; }
        .passives-panel { flex: 1; border: 2px solid #874185; padding: 5px; }
        
        .stat-row { display: flex; align-items: center; gap: 5px; margin: 3px 0; }
        input, select { background: #f4e1c1; border: 1px solid #342420; padding: 2px; }
    </style>
</head>
<body>

    <div class="page-header">
        <h1>MONSTERPATCH SQUAD BUILDER</h1>
        <p>ALPHA v1.0.0</p>
    </div>
    
    <div class="container">
        <script>
            function createSlot(num) {
                document.write(`
                    <div class="slot">
                        <div class="slot-title">SLOT ${num}</div>
                        <div class="header-row">
                            <input type="text" placeholder="NICKNAME" style="flex:1;">
                            Lv <input type="number" value="50" style="width: 30px;">
                            <input type="checkbox"> SPARKLE
                        </div>
                        <div class="moveset-box">
                            <strong>MOVESET</strong><br>
                            <input type="text" placeholder="Move 1"> <input type="text" placeholder="Move 2"><br>
                            <input type="text" placeholder="Move 3"> <input type="text" placeholder="Move 4">
                        </div>
                        <div class="main-info">
                            <div class="sprite-box"></div>
                            <div>
                                <input type="text" placeholder="003 Hawkamere" style="width: 100%; margin-bottom: 5px;"><br>
                                <input type="text" placeholder="Held Item" style="width: 100%;">
                            </div>
                        </div>
                        <div class="bottom-info">
                            <div class="stats-panel">
                                <strong>STATS</strong>
                                ${['HP','ATK','MAG','DEF','RES','SPD'].map(s => `
                                    <div class="stat-row">
                                        <span style="width:30px;">${s}</span> 
                                        <select><option>C</option></select>
                                        <div style="height:8px; width:40px; background:#d8bc6a;"></div> 40
                                    </div>
                                `).join('')}
                            </div>
                            <div class="passives-panel">
                                <strong>PASSIVES</strong>
                                <input type="text" placeholder="Passive 1" style="width:90%; display:block; margin:4px 0;">
                                <input type="text" placeholder="Passive 2" style="width:90%; display:block; margin:4px 0;">
                                <input type="text" placeholder="Passive 3" style="width:90%; display:block; margin:4px 0;">
                                <input type="text" placeholder="Passive 4" style="width:90%; display:block; margin:4px 0;">
                            </div>
                        </div>
                    </div>
                `);
            }
        </script>
        <script>for(let i=1; i<=4; i++) createSlot(i);</script>
    </div>
</body>
</html>
