<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monsterpatch Squad Builder</title>
    <style>
        /* Base Page Styles */
        body { 
            background-color: #3b302c; 
            color: #f4e1c1; 
            font-family: sans-serif; 
            margin: 0;
            padding: 20px;
        }
        h1, h3 { margin: 0; }
        
        /* Layout */
        .container { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        
        /* Slot Design */
        .slot { 
            border: 2px solid #f4e1c1; 
            padding: 15px; 
            border-radius: 4px; 
            background-color: #4a3f3a;
        }

        /* Component Groups */
        .slot-header, .moveset-container, .sprite-area, .stats-container {
            margin-bottom: 10px;
            padding: 5px;
            border: 1px solid #7a6a5e;
        }

        .stat-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 5px 0;
        }
    </style>
</head>
<body>

    <h1 style="text-align: center;">MONSTERPATCH SQUAD BUILDER</h1>
    <p style="text-align: center;">ALPHA v1.0.0</p>
    
    <div class="container">
        <!-- SLOT 1 -->
        <div class="slot">
            <div class="slot-header">
                <input type="text" placeholder="NICKNAME">
                <label>Lv <input type="number" value="50" style="width: 40px;"></label>
                <label><input type="checkbox"> SPARKLE</label>
            </div>

            <div class="moveset-container">
                <input type="text" placeholder="Move 1">
                <input type="text" placeholder="Move 2">
                <input type="text" placeholder="Move 3">
                <input type="text" placeholder="Move 4">
            </div>

            <div class="sprite-area">
                <img src="placeholder.png" alt="Monster" width="100" height="100">
                <select><option>Select Monster</option></select>
                <input type="text" placeholder="Held Item">
            </div>

            <div class="stats-container">
                <div class="stat-row">
                    <span>HP</span>
                    <select><option>C</option></select>
                    <input type="range" min="0" max="100" value="40">
                </div>
                <!-- Repeat stat-row for ATK, MAG, DEF, RES, SPD -->
            </div>
        </div>

        <!-- Copy the structure above for SLOT 2, 3, and 4 -->
    </div>
</body>
</html>
